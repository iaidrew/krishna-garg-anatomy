<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Premium Dark Slate Gradient Background -->
  <defs>
    <linearGradient id="placeholderBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
  </defs>

  <!-- Card Background -->
  <rect width="400" height="400" fill="url(#placeholderBg)" rx="24" />
  
  <!-- Subtle Grid/Pattern overlay for technical look -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="1">
    <line x1="40" y1="0" x2="40" y2="400" />
    <line x1="80" y1="0" x2="80" y2="400" />
    <line x1="120" y1="0" x2="120" y2="400" />
    <line x1="160" y1="0" x2="160" y2="400" />
    <line x1="200" y1="0" x2="200" y2="400" />
    <line x1="240" y1="0" x2="240" y2="400" />
    <line x1="280" y1="0" x2="280" y2="400" />
    <line x1="320" y1="0" x2="320" y2="400" />
    <line x1="360" y1="0" x2="360" y2="400" />
    
    <line x1="0" y1="40" x2="400" y2="40" />
    <line x1="0" y1="80" x2="400" y2="80" />
    <line x1="0" y1="120" x2="400" y2="120" />
    <line x1="0" y1="160" x2="400" y2="160" />
    <line x1="0" y1="200" x2="400" y2="200" />
    <line x1="0" y1="240" x2="400" y2="240" />
    <line x1="0" y1="280" x2="400" y2="280" />
    <line x1="0" y1="320" x2="400" y2="320" />
    <line x1="0" y1="360" x2="400" y2="360" />
  </g>

  <!-- Ambient Light Circle -->
  <circle cx="200" cy="160" r="110" fill="#a855f7" opacity="0.15" filter="blur(20px)" />

  <!-- Elegant Professional Avatar Silhouette -->
  <circle cx="200" cy="155" r="55" fill="#1e293b" stroke="#334155" stroke-width="2" />
  
  <!-- Silhouette of Head/Shoulders -->
  <!-- Head -->
  <circle cx="200" cy="142" r="22" fill="#475569" />
  <!-- Shoulders -->
  <path d="M 160,200 C 160,175 175,170 200,170 C 225,170 240,175 240,200 Z" fill="#475569" />
  
  <!-- Sleek placeholder text & frame -->
  <rect x="50" y="240" width="300" height="110" rx="12" fill="#1e293b" fill-opacity="0.6" stroke="#334155" stroke-width="1.5" />
  
  <text x="200" y="272" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="700" fill="#f8fafc" text-anchor="middle" letter-spacing="1">
    FACULTY PORTRAIT
  </text>
  
  <text x="200" y="295" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="500" fill="#94a3b8" text-anchor="middle">
    DR. KRISHNA GARG
  </text>
  
  <text x="200" y="322" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="400" fill="#a855f7" text-anchor="middle" opacity="0.9">
    [ PLACE REAL PHOTO IN ASSETS FOLDER ]
  </text>
</svg>
